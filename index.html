<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GodBot | Sentinel V26.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: white; overflow: hidden; height: 100vh; margin: 0; padding: 0; }
        .glass-card { background: rgba(23, 27, 34, 0.9); backdrop-filter: blur(10px); border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Ajuste para a lista de ativos não quebrar o layout */
        .custom-scroll { 
            overflow-y: auto; 
            max-height: 180px; 
            scrollbar-width: thin;
            scrollbar-color: #3b82f6 transparent;
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        .live-indicator { height: 6px; width: 6px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .sinal-anim { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Impede que o ecrã salte ao aparecer o sinal */
        #display-sinal { min-height: 280px; }
    </style>
</head>
<body class="p-4 flex flex-col gap-3">

    <header class="flex justify-between items-center px-1">
        <div>
            <h1 class="text-xl font-bold tracking-tighter text-white leading-none">GOD<span class="text-blue-500">BOT</span></h1>
            <p class="text-[8px] text-gray-400 uppercase tracking-widest mt-1"><span class="live-indicator mr-1"></span> SENTINEL V26.1 ONLINE</p>
        </div>
        <button onclick="window.location.reload()" class="bg-blue-600/20 text-blue-400 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fas fa-sync-alt text-xs"></i></button>
    </header>

    <div class="glass-card p-4 border-t-2 border-blue-500">
        <h3 id="titulo-painel" class="text-gray-400 text-[10px] font-bold mb-3 uppercase tracking-widest text-center">Selecionar Mercado</h3>
        
        <div id="menu-mercados" class="space-y-2">
            <button onclick="mostrarAtivos('GLOBAL FOREX')" class="w-full bg-gray-800/40 p-3 rounded-xl border border-gray-700/50 flex justify-between items-center text-sm transition active:scale-95">
                <span>🌎 GLOBAL FOREX</span><i class="fas fa-chevron-right text-blue-500 text-xs"></i>
            </button>
            <button onclick="mostrarAtivos('FOREX OTC')" class="w-full bg-gray-800/40 p-3 rounded-xl border border-gray-700/50 flex justify-between items-center text-sm transition active:scale-95">
                <span>🤖 FOREX OTC</span><i class="fas fa-chevron-right text-blue-500 text-xs"></i>
            </button>
            <button onclick="mostrarAtivos('CRYPTO OTC')" class="w-full bg-gray-800/40 p-3 rounded-xl border border-gray-700/50 flex justify-between items-center text-sm transition active:scale-95">
                <span>₿ CRYPTO OTC</span><i class="fas fa-chevron-right text-blue-500 text-xs"></i>
            </button>
        </div>

        <div id="lista-ativos" class="hidden grid grid-cols-2 gap-2 custom-scroll pr-1"></div>

        <div id="menu-timeframes" class="hidden grid grid-cols-3 gap-2">
            <button onclick="prepararAnalise('S15')" class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-[10px] font-bold active:bg-blue-600">S15</button>
            <button onclick="prepararAnalise('S30')" class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-[10px] font-bold active:bg-blue-600">S30</button>
            <button onclick="prepararAnalise('M1')" class="bg-blue-600 p-2 rounded-lg border border-blue-400 text-[10px] font-bold">M1</button>
            <button onclick="prepararAnalise('M2')" class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-[10px] font-bold active:bg-blue-600">M2</button>
            <button onclick="prepararAnalise('M5')" class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-[10px] font-bold active:bg-blue-600">M5</button>
            <button onclick="prepararAnalise('H1')" class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-[10px] font-bold active:bg-blue-600">H1</button>
        </div>

        <button id="btn-voltar" onclick="voltarAoMenu()" class="hidden w-full mt-3 text-[9px] text-gray-500 underline uppercase tracking-widest text-center">Voltar</button>
    </div>

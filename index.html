<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GodBot | Sentinel V26.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 flex flex-col gap-4">

    <header class="flex justify-between items-end px-2">
        <div>
            <h1 class="orbitron text-2xl font-black tracking-tighter text-white">GOD<span class="text-blue-500">BOT</span></h1>
            <div class="flex items-center gap-2">
                <span class="h-1.5 w-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                <p class="text-[9px] text-blue-400 font-bold tracking-[0.3em] uppercase">Alchemist V26.1 System</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-500 font-bold uppercase">Security Level</p>
            <p class="text-[10px] text-green-500 font-bold">MAXIMUM</p>
        </div>
    </header>

    <div class="glass-card p-5">
        <div id="setup-view">
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.2em] mb-4 text-center uppercase">Initial Calibration</p>
            
            <div id="menu-mercados" class="grid gap-3">
                <button onclick="mostrarAtivos('GLOBAL FOREX')" class="group relative overflow-hidden bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center transition-all hover:border-blue-500/50">
                    <span class="font-bold text-sm tracking-widest">GLOBAL FOREX</span>
                    <i class="fas fa-globe-americas text-blue-500 group-hover:rotate-12 transition-transform text-xl"></i>
                </button>
                <button onclick="mostrarAtivos('FOREX OTC')" class="group relative overflow-hidden bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center transition-all hover:border-blue-500/50">
                    <span class="font-bold text-sm tracking-widest">FOREX OTC</span>
                    <i class="fas fa-microchip text-blue-500 group-hover:rotate-12 transition-transform text-xl"></i>
                </button>
                <button onclick="mostrarAtivos('CRYPTO OTC')" class="group relative overflow-hidden bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center transition-all hover:border-blue-500/50">
                    <span class="font-bold text-sm tracking-widest">CRYPTO OTC</span>
                    <i class="fas fa-coins text-blue-500 group-hover:rotate-12 transition-transform text-xl"></i>
                </button>
            </div>

            <div id="lista-ativos" class="hidden custom-scroll space-y-2 max-h-[250px] pr-2"></div>

            <div id="menu-timeframes" class="hidden grid grid-cols-3 gap-3">
                <button onclick="prepararAnalise('S15')" class="bg-white/5 py-4 rounded-xl font-black text-xs border border-white/5">S15</button>
                <button onclick="prepararAnalise('S30')" class="bg-white/5 py-4 rounded-xl font-black text-xs border border-white/5">S30</button>
                <button onclick="prepararAnalise('M1')" class="bg-blue-600 py-4 rounded-xl font-black text-xs shadow-lg shadow-blue-600/40">M1</button>
                <button onclick="prepararAnalise('M2')" class="bg-white/5 py-4 rounded-xl font-black text-xs border border-white/5">M2</button>
                <button onclick="prepararAnalise('M5')" class="bg-white/5 py-4 rounded-xl font-black text-xs border border-white/5">M5</button>
                <button onclick="prepararAnalise('H1')" class="bg-white/5 py-4 rounded-xl font-black text-xs border border-white/5">H1</button>
            </div>

            <button id="btn-voltar" onclick="voltarAoMenu()" class="hidden w-full mt-4 text-[9px] text-gray-500 font-bold uppercase tracking-widest"><i class="fas fa-arrow-left mr-2"></i> Reset System</button>
        </div>
    </div>

    <div class="glass-card flex-grow flex flex-col items-center justify-center p-6 relative overflow-hidden">
        
        <div id="placeholder-ia" class="flex flex-col items-center opacity-20">
            <div class="w-24 h-24 border-2 border-dashed border-blue-500 rounded-full animate-[spin_20s_linear_infinite] flex items-center justify-center">
                <i class="fas fa-shield-alt text-2xl"></i>
            </div>
            <p class="orbitron text-[10px] mt-4 tracking-[0.4em]">STANDBY MODE</p>
        </div>

        <div id="loader-ia" class="hidden w-full flex flex-col items-center">
            <div class="core-container mb-8">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
                <div class="core-brain">
                    <i class="fas fa-atom text-4xl text-blue-400 animate-pulse"></i>
                </div>
            </div>
            
            <div class="w-full space-y-1">
                <div id="capa-1" class="layer-box">>> DECRYPTING ORDER BLOCKS</div>
                <div id="capa-2" class="layer-box">>> CALCULATING VOLUME DELTA</div>
                <div id="capa-3" class="layer-box">>> TRACING INSTITUTIONAL FLOW</div>
                <div id="capa-4" class="layer-box">>> SMART MONEY CONFLUENCE</div>
                <div id="capa-5" class="layer-box">>> SENTINEL V26 FINAL VALIDATION</div>
            </div>
        </div>

        <div id="resultado-sinal" class="hidden w-full text-center scale-up">
            <div class="inline-block px-4 py-2 rounded-full border border-blue-500/30 bg-blue-500/10 mb-6">
                <p id="asset-label" class="orbitron text-sm font-bold text-blue-400 tracking-widest"></p>
            </div>

            <div class="flex flex-col items-center justify-center">
                <i id="seta-cima" class="fas fa-chevron-double-up arrow-glow mb-2"></i>
                <h2 id="direcao-texto" class="signal-text orbitron font-black uppercase BUY">BUY</h2>
                <i id="seta-baixo" class="fas fa-chevron-double-down arrow-glow mt-2"></i>
            </div>

            <div class="flex gap-4 mt-8">
                <div class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Accuracy</p>
                    <p id="confianca-valor" class="orbitron text-2xl font-black text-white">--</p>
                </div>
                <div class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Timeframe</p>
                    <p id="tf-valor" class="orbitron text-2xl font-black text-white">--</p>
                </div>
            </div>

            <div class="mt-8 space-y-4">
                <a href="https://u3.shortink.io/smart/AgAXDU8MKYdH9a" target="_blank" class="block w-full bg-blue-600 text-white py-5 rounded-2xl orbitron font-black text-sm shadow-[0_0_30px_rgba(37,99,235,0.4)] active:scale-95 transition-transform uppercase tracking-tighter">
                    Execute Trade Now
                </a>
                <div class="flex gap-2">
                    <button onclick="prepararAnalise(tfAtual)" class="flex-1 py-4 rounded-xl bg-white/5 border border-white/10 text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-sync-alt mr-2 text-blue-500"></i> Rescan</button>
                    <button onclick="voltarAoMenu()" class="flex-1 py-4 rounded-xl bg-white/5 border border-white/10 text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-home mr-2 text-blue-500"></i> Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FLAGS = {
            "EUR":"🇪🇺", "USD":"🇺🇸", "GBP":"🇬🇧", "JPY":"🇯🇵", 
            "AUD":"🇦🇺", "CAD":"🇨🇦", "CHF":"🇨🇭", "NZD":"🇳🇿",
            "BTC":"🪙", "ETH":"🪙", "SOL":"🪙", "BNB":"🪙",
            "XRP":"🪙", "ADA":"🪙", "DOGE":"🪙", "DOT":"🪙",
            "AVAX":"🪙", "LTC":"🪙", "TRX":"🪙"
        };

        const MERCADOS = {
            'GLOBAL FOREX': ["EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD", "USD/CAD", "USD/CHF", "NZD/USD", "EUR/GBP", "EUR/JPY", "GBP/JPY", "EUR/CHF", "AUD/CAD"],
            'FOREX OTC': ["EUR/USD OTC", "GBP/USD OTC", "USD/JPY OTC", "AUD/USD OTC", "USD/CAD OTC", "USD/CHF OTC", "NZD/USD OTC", "EUR/GBP OTC", "EUR/JPY OTC", "GBP/JPY OTC", "EUR/CHF OTC", "AUD/CAD OTC"],
            'CRYPTO OTC': ["Bitcoin OTC", "Ethereum OTC", "Solana OTC", "Binance Coin OTC", "Cardano OTC", "Dogecoin OTC", "Polkadot OTC", "Avalanche OTC", "Litecoin OTC", "TRON OTC"]
        };

        let ativoAtual = ""; let tfAtual = "";

        // PEDIDO 2: Função auxiliar para pegar as bandeiras certas
        function getFlags(par) {
            if (par.includes('Bitcoin')) return "🪙";
            if (par.includes('Ethereum')) return "🪙";
            // Adicionar mais regras de cripto se necessário aqui...
            
            const moedas = par.split(' ')[0].split('/');
            if (moedas.length !== 2) return "🌐";
            
            return (FLAGS[moedas[0]] || "🌐") + (FLAGS[moedas[1]] || "🌐");
        }

        function mostrarAtivos(tipo) {
            document.getElementById('menu-mercados').classList.add('hidden');
            document.getElementById('lista-ativos').classList.remove('hidden');
            document.getElementById('btn-voltar').classList.remove('hidden');
            const container = document.getElementById('lista-ativos');
            container.innerHTML = '';
            
            MERCADOS[tipo].forEach(ativo => {
                const btn = document.createElement('button');
                btn.className = "w-full group relative overflow-hidden bg-white/5 p-4 rounded-xl border border-white/5 flex items-center gap-3 transition-all hover:border-blue-500/30 active:scale-[0.98]";
                
                // PEDIDO 2: Colocar as bandeiras nos pares
                const bandeiras = getFlags(ativo);
                btn.innerHTML = `
                    <span class="text-lg">${bandeiras}</span>
                    <span class="font-bold text-[11px] tracking-widest text-white/90">${ativo}</span>
                    <i class="fas fa-chevron-right text-gray-700 ml-auto group-hover:text-blue-500 transition-colors"></i>
                `;
                
                btn.onclick = () => selecionarTF(ativo);
                container.appendChild(btn);
            });
        }

        function selecionarTF(ativo) {
            ativoAtual = ativo;
            document.getElementById('lista-ativos').classList.add('hidden');
            document.getElementById('menu-timeframes').classList.remove('hidden');
        }

        function voltarAoMenu() {
            document.getElementById('menu-mercados').classList.remove('hidden');
            document.getElementById('lista-ativos').classList.add('hidden');
            document.getElementById('menu-timeframes').classList.add('hidden');
            document.getElementById('btn-voltar').classList.add('hidden');
            document.getElementById('resultado-sinal').classList.add('hidden');
            document.getElementById('placeholder-ia').classList.remove('hidden');
        }

        function prepararAnalise(tf) {
            tfAtual = tf;
            document.getElementById('menu-timeframes').classList.add('hidden');
            document.getElementById('placeholder-ia').classList.add('hidden');
            document.getElementById('resultado-sinal').classList.add('hidden');
            document.getElementById('loader-ia').classList.remove('hidden');
            document.getElementById('btn-voltar').classList.add('hidden');

            for(let i=1; i<=5; i++) {
                document.getElementById(`capa-${i}`).className = "layer-box";
            }

            const timings = [1000, 2200, 3500, 4800, 6000];
            
            timings.forEach((ms, i) => {
                setTimeout(() => {
                    const el = document.getElementById(`capa-${i+1}`);
                    el.classList.add('layer-active');
                    if(i > 0) {
                        const prev = document.getElementById(`capa-${i}`);
                        prev.classList.remove('layer-active');
                        prev.classList.add('layer-done');
                    }
                    if(i === 4) setTimeout(finalizarAnalise, 1000);
                }, ms);
            });
        }

        function finalizarAnalise() {
            const direcao = Math.random() > 0.5 ? 'BUY' : 'SELL';
            const conf = (Math.random() * (98.9 - 94.2) + 94.2).toFixed(1);
            
            document.getElementById('loader-ia').classList.add('hidden');
            document.getElementById('resultado-sinal').classList.remove('hidden');
            
            const txt = document.getElementById('direcao-texto');
            const sc = document.getElementById('seta-cima');
            const sb = document.getElementById('seta-baixo');
            
            txt.innerText = direcao;
            
            // PEDIDO 4: Par na análise final com bandeiras certas
            const bandeirasAnalyse = getFlags(ativoAtual);
            document.getElementById('asset-label').innerText = bandeirasAnalyse + " " + ativoAtual;
            
            document.getElementById('confianca-valor').innerText = conf + '%';
            document.getElementById('tf-valor').innerText = tfAtual;

            if(direcao === 'BUY') {
                txt.className = "signal-text orbitron font-black neon-buy";
                sc.className = "fas fa-chevron-double-up arrow-glow neon-buy animate-bounce";
                sb.className = "fas fa-chevron-double-up arrow-glow text-white/5";
            } else {
                txt.className = "signal-text orbitron font-black neon-sell";
                sc.className = "fas fa-chevron-double-down arrow-glow text-white/5";
                sb.className = "fas fa-chevron-double-down arrow-glow neon-sell animate-bounce";
            }
        }
    </script>
</body>
</html>

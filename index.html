<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GodBot | Sentinel V26.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <header class="p-4 flex justify-between items-end">
        <div>
            <h1 class="orbitron text-2xl font-black text-white">GOD<span class="text-blue-500">BOT</span></h1>
            <p class="text-[9px] text-blue-400 font-bold uppercase tracking-[0.3em]">Sentinel V26.1</p>
        </div>
    </header>

    <main id="main-content" class="p-4">
        <div id="tab-home" class="tab-pane active-pane">
            <div class="glass-card p-6">
                <p class="orbitron text-white text-xs mb-4">TERMINAL STATUS: <span id="vip-badge" class="text-red-500">OFFLINE</span></p>
                <div class="bg-black/40 p-4 rounded-xl mb-6">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">ID Utilizador</p>
                    <code id="user-id-home" class="orbitron text-lg text-white">------</code>
                </div>
                <a href="https://u3.shortink.io/smart/AgAXDU8MKYdH9a" target="_blank" class="block w-full bg-blue-600 text-center py-4 rounded-xl orbitron font-black text-xs text-white">ATIVAR LICENÇA</a>
            </div>
        </div>

        <div id="tab-analyse" class="tab-pane">
            <div id="lock-screen" class="glass-card p-8 text-center hidden">
                <i class="fas fa-lock text-3xl text-red-500 mb-4 animate-pulse"></i>
                <h3 class="orbitron text-white font-black mb-4">ACESSO BLOQUEADO</h3>
                <a href="https://u3.shortink.io/smart/AgAXDU8MKYdH9a" target="_blank" class="block bg-blue-600 text-white p-4 rounded-xl font-black text-[10px] orbitron">COMPRAR LICENÇA</a>
            </div>
            <div id="analyse-content">
                <div id="setup-view" class="glass-card p-4 mb-4">
                    <div id="menu-mercados" class="grid gap-2">
                        <button onclick="mostrarAtivos()" class="market-btn bg-white/5 p-4 rounded-lg flex justify-between text-white font-bold">GLOBAL FOREX <i class="fas fa-globe text-blue-500"></i></button>
                    </div>
                </div>
                </div>
        </div>

        <div id="tab-free" class="tab-pane">
            <div class="glass-card p-10 text-center">
                <i class="fas fa-bolt text-blue-500 text-3xl mb-4"></i>
                <h3 class="orbitron text-white font-black">MODO DEMO</h3>
                <button onclick="alert('Analisando...')" class="mt-6 bg-white text-black px-8 py-3 rounded-lg font-bold">GERAR SINAL</button>
            </div>
        </div>

        <div id="tab-support" class="tab-pane">
            <div class="glass-card p-10 text-center">
                <i class="fas fa-headset text-blue-500 text-3xl mb-4"></i>
                <h3 class="orbitron text-white font-black">SUPORTE</h3>
                <a href="https://t.me/Tgomes0" class="block mt-6 bg-blue-600 text-white py-3 rounded-lg font-bold">ABRIR TELEGRAM</a>
            </div>
        </div>
    </main>

    <nav>
        <button type="button" onclick="switchTab('home')" class="nav-item active" id="nav-home"><i class="fas fa-home"></i><span>Home</span></button>
        <button type="button" onclick="switchTab('analyse')" class="nav-item" id="nav-analyse"><i class="fas fa-chart-line"></i><span>Analyse</span></button>
        <button type="button" onclick="switchTab('free')" class="nav-item" id="nav-free"><i class="fas fa-bolt"></i><span>Free</span></button>
        <button type="button" onclick="switchTab('support')" class="nav-item" id="nav-support"><i class="fas fa-headset"></i><span>Support</span></button>
    </nav>

    <script>
        const vips = ["5052278069"]; 

        function switchTab(tabId) {
            console.log("A mudar para: " + tabId); // Para veres no console do PC se clica
            
            // 1. Remove active de todas as panes
            document.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.remove('active-pane');
            });

            // 2. Remove active de todos os botões
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
            });

            // 3. Ativa a pane correta
            const targetPane = document.getElementById('tab-' + tabId);
            if(targetPane) {
                targetPane.classList.add('active-pane');
            }

            // 4. Ativa o botão correto
            const targetBtn = document.getElementById('nav-' + tabId);
            if(targetBtn) {
                targetBtn.classList.add('active');
            }
        }

        // --- INICIALIZAÇÃO TELEGRAM ---
        const tg = window.Telegram.WebApp;
        tg.expand();

        if(tg.initDataUnsafe?.user) {
            const uID = tg.initDataUnsafe.user.id.toString();
            document.getElementById('user-id-home').innerText = uID;
            
            if(vips.includes(uID)) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('analyse-content').classList.remove('hidden');
                document.getElementById('vip-badge').innerText = "ONLINE (VIP)";
                document.getElementById('vip-badge').className = "text-green-500 font-black";
            } else {
                document.getElementById('lock-screen').classList.remove('hidden');
                document.getElementById('analyse-content').classList.add('hidden');
            }
        }
    </script>
</body>
</html>

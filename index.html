<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GodBot | Sentinel V26.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');

        body { font-family: 'Rajdhani', sans-serif; background-color: #030508; color: white; overflow: hidden; height: 100vh; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-card { 
            background: linear-gradient(145deg, rgba(10, 15, 25, 0.95), rgba(5, 8, 15, 0.98)); 
            backdrop-filter: blur(20px); 
            border-radius: 2rem; 
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Scanner Central */
        .core-container { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border-radius: 50%; border: 2px solid transparent; }
        .ring-1 { inset: 0; border-top-color: #3b82f6; border-bottom-color: #3b82f6; animation: spin 2s linear infinite; }
        .ring-2 { inset: 12px; border-left-color: #60a5fa; border-right-color: #60a5fa; animation: spin-reverse 3s linear infinite; opacity: 0.4; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* Lista de Ativos Melhorada */
        .asset-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 10px;
            border-radius: 14px;
            font-size: 13px; /* Letra maior conforme pedido */
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .asset-btn:active { background: #3b82f6; transform: scale(0.96); }

        /* Camadas de Análise */
        .layer-box { 
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
            padding: 10px 15px; border-radius: 8px; background: rgba(255,255,255,0.02);
            border-left: 4px solid #1e293b; margin-bottom: 6px; width: 100%;
        }
        .layer-active { border-left-color: #3b82f6; background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .layer-done { border-left-color: #10b981; color: #10b981; }

        /* Resultado */
        .signal-text { font-size: 85px; line-height: 0.8; filter: drop-shadow(0 0 20px currentColor); }
        .neon-buy { color: #10b981; text-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .neon-sell { color: #ef4444; text-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
        
        .custom-scroll { overflow-y: auto; max-height: 240px; scrollbar-width: none; }
        .custom-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 flex flex-col gap-4">

    <header class="flex justify-between items-center px-2">
        <div>
            <h1 class="orbitron text-2xl font-black text-white">GOD<span class="text-blue-500">BOT</span></h1>
            <p class="text-[9px] text-blue-400 font-bold tracking-[0.3em] uppercase">Alchemist V26.1 Online</p>
        </div>
        <div class="bg-blue-500/10 border border-blue-500/30 px-3 py-1 rounded-lg">
            <span class="text-[10px] text-blue-400 font-black">SENTINEL MODE</span>
        </div>
    </header>

    <div class="glass-card p-5">
        <div id="setup-view">
            <p id="titulo-painel" class="text-gray-500 text-[10px] font-bold tracking-widest mb-4 text-center uppercase">Selecione o Mercado</p>
            
            <div id="menu-mercados" class="grid gap-3">
                <button onclick="mostrarAtivos('GLOBAL FOREX')" class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center transition-all active:bg-blue-600/20">
                    <span class="font-bold text-sm tracking-widest">🌎 GLOBAL FOREX</span>
                    <i class="fas fa-chevron-right text-blue-500 text-xs"></i>
                </button>
                <button onclick="mostrarAtivos('FOREX OTC')" class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center transition-all active:bg-blue-600/20">
                    <span class="font-bold text-sm tracking-widest">🤖 FOREX OTC</span>
                    <i class="fas fa-chevron-right text-blue-500 text-xs"></i>
                </button>
                <button onclick="mostrarAtivos('CRYPTO OTC')" class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center transition-all active:bg-blue-600/20">
                    <span class="font-bold text-sm tracking-widest">₿ CRYPTO OTC</span>
                    <i class="fas fa-chevron-right text-blue-500 text-xs"></i>
                </button>
            </div>

            <div id="lista-ativos" class="hidden grid grid-cols-2 gap-3 custom-scroll"></div>

            <div id="menu-timeframes" class="hidden grid grid-cols-3 gap-3">
                <button onclick="prepararAnalise('S15')" class="bg-white/5 py-4 rounded-xl font-black text-xs">S15</button>
                <button onclick="prepararAnalise('S30')" class="bg-white/5 py-4 rounded-xl font-black text-xs">S30</button>
                <button onclick="prepararAnalise('M1')" class="bg-blue-600 py-4 rounded-xl font-black text-xs">M1</button>
                <button onclick="prepararAnalise('M2')" class="bg-white/5 py-4 rounded-xl font-black text-xs">M2</button>
                <button onclick="prepararAnalise('M5')" class="bg-white/5 py-4 rounded-xl font-black text-xs">M5</button>
                <button onclick="prepararAnalise('H1')" class="bg-white/5 py-4 rounded-xl font-black text-xs">H1</button>
            </div>

            <button id="btn-voltar" onclick="voltarAoMenu()" class="hidden w-full mt-4 text-[10px] text-gray-400 font-bold uppercase tracking-widest underline decoration-blue-500/50">Voltar</button>
        </div>
    </div>

    <div class="glass-card flex-grow flex flex-col items-center justify-center p-6 relative">
        
        <div id="placeholder-ia" class="opacity-10 text-center">
            <i class="fas fa-microchip text-6xl mb-4"></i>
            <p class="orbitron text-[10px] tracking-[0.4em]">AGUARDANDO INPUT</p>
        </div>

        <div id="loader-ia" class="hidden w-full flex flex-col items-center">
            <div class="core-container mb-6">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <i class="fas fa-brain text-blue-400 text-3xl animate-pulse"></i>
            </div>
            <div class="w-full max-w-[280px]">
                <div id="capa-1" class="layer-box">ANALISANDO FLUXO</div>
                <div id="capa-2" class="layer-box">MAPEANDO LIQUIDEZ</div>
                <div id="capa-3" class="layer-box">FILTRANDO VOLUMES</div>
                <div id="capa-4" class="layer-box">VALIDAÇÃO SENTINEL</div>
            </div>
        </div>

        <div id="resultado-sinal" class="hidden w-full text-center">
            <div class="bg-blue-500/20 border-y border-blue-500/30 w-full py-3 mb-6">
                <p id="asset-label" class="orbitron text-xl font-black text-blue-400 tracking-widest">---</p>
            </div>

            <div class="flex flex-col items-center">
                <i id="seta-cima" class="fas fa-chevron-up text-4xl mb-2"></i>
                <h2 id="direcao-texto" class="signal-text orbitron font-black uppercase">BUY</h2>
                <i id="seta-baixo" class="fas fa-chevron-down text-4xl mt-2"></i>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Confiança</p>
                    <p id="confianca-valor" class="orbitron text-xl font-black text-white">--</p>
                </div>
                <div class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Tempo</p>
                    <p id="tf-valor" class="orbitron text-xl font-black text-white">--</p>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <a href="https://u3.shortink.io/smart/AgAXDU8MKYdH9a" target="_blank" class="block w-full bg-blue-600 text-white py-5 rounded-2xl orbitron font-black text-sm uppercase shadow-lg shadow-blue-600/30">Executar Agora</a>
                <div class="flex gap-2">
                    <button onclick="prepararAnalise(tfAtual)" class="flex-1 py-3 rounded-xl bg-white/5 text-[10px] font-bold uppercase border border-white/10"><i class="fas fa-sync-alt mr-2"></i>Re-scan</button>
                    <button onclick="voltarAoMenu()" class="flex-1 py-3 rounded-xl bg-white/5 text-[10px] font-bold uppercase border border-white/10"><i class="fas fa-home mr-2"></i>Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ICONS = {
            "EUR": "🇪🇺", "USD": "🇺🇸", "GBP": "🇬🇧", "JPY": "🇯🇵", 
            "AUD": "🇦🇺", "CAD": "🇨🇦", "CHF": "🇨🇭", "NZD": "🇳🇿",
            "BTC": "₿", "ETH": "♦️", "SOL": "☀️", "BNB": "🟡",
            "Bitcoin": "₿", "Ethereum": "♦️", "Solana": "☀️"
        };

        const MERCADOS = {
            'GLOBAL FOREX': ["EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD", "USD/CAD", "USD/CHF", "NZD/USD", "EUR/GBP", "EUR/JPY", "GBP/JPY", "EUR/CHF", "AUD/CAD"],
            'FOREX OTC': ["EUR/USD OTC", "GBP/USD OTC", "USD/JPY OTC", "AUD/USD OTC", "USD/CAD OTC", "USD/CHF OTC", "NZD/USD OTC", "EUR/GBP OTC", "EUR/JPY OTC", "GBP/JPY OTC", "EUR/CHF OTC", "AUD/CAD OTC"],
            'CRYPTO OTC': ["Bitcoin OTC", "Ethereum OTC", "Solana OTC", "Binance Coin OTC", "Cardano OTC", "Dogecoin OTC", "Polkadot OTC", "Avalanche OTC", "Litecoin OTC", "TRON OTC"]
        };

        let ativoAtual = ""; let tfAtual = "";

        function getAssetIcon(name) {
            const firstPart = name.split('/')[0].split(' ')[0];
            return ICONS[firstPart] || "📈";
        }

        function mostrarAtivos(tipo) {
            document.getElementById('menu-mercados').classList.add('hidden');
            document.getElementById('lista-ativos').classList.remove('hidden');
            document.getElementById('btn-voltar').classList.remove('hidden');
            document.getElementById('titulo-painel').innerText = tipo;
            const container = document.getElementById('lista-ativos');
            container.innerHTML = '';
            
            MERCADOS[tipo].forEach(ativo => {
                const btn = document.createElement('button');
                btn.className = "asset-btn";
                btn.innerHTML = `<span>${getAssetIcon(ativo)}</span> ${ativo}`;
                btn.onclick = () => selecionarTF(ativo);
                container.appendChild(btn);
            });
        }

        function selecionarTF(ativo) {
            ativoAtual = ativo;
            document.getElementById('lista-ativos').classList.add('hidden');
            document.getElementById('menu-timeframes').classList.remove('hidden');
            document.getElementById('titulo-painel').innerText = "Tempo de Expiração";
        }

        function voltarAoMenu() {
            document.getElementById('menu-mercados').classList.remove('hidden');
            document.getElementById('lista-ativos').classList.add('hidden');
            document.getElementById('menu-timeframes').classList.add('hidden');
            document.getElementById('btn-voltar').classList.add('hidden');
            document.getElementById('resultado-sinal').classList.add('hidden');
            document.getElementById('placeholder-ia').classList.remove('hidden');
            document.getElementById('titulo-painel').innerText = "Selecione o Mercado";
        }

        function prepararAnalise(tf) {
            tfAtual = tf;
            document.getElementById('menu-timeframes').classList.add('hidden');
            document.getElementById('placeholder-ia').classList.add('hidden');
            document.getElementById('resultado-sinal').classList.add('hidden');
            document.getElementById('loader-ia').classList.remove('hidden');
            document.getElementById('btn-voltar').classList.add('hidden');

            for(let i=1; i<=4; i++) document.getElementById(`capa-${i}`).className = "layer-box";

            const steps = [800, 1800, 2800, 3800];
            steps.forEach((ms, i) => {
                setTimeout(() => {
                    const el = document.getElementById(`capa-${i+1}`);
                    el.classList.add('layer-active');
                    if(i > 0) {
                        const prev = document.getElementById(`capa-${i}`);
                        prev.classList.remove('layer-active');
                        prev.classList.add('layer-done');
                    }
                    if(i === 3) setTimeout(finalizarAnalise, 800);
                }, ms);
            });
        }

        function finalizarAnalise() {
            const direcao = Math.random() > 0.5 ? 'COMPRA' : 'VENDA';
            const conf = (Math.random() * (98.2 - 92.5) + 92.5).toFixed(1);
            
            document.getElementById('loader-ia').classList.add('hidden');
            document.getElementById('resultado-sinal').classList.remove('hidden');
            
            const txt = document.getElementById('direcao-texto');
            const sc = document.getElementById('seta-cima');
            const sb = document.getElementById('seta-baixo');
            
            txt.innerText = direcao;
            document.getElementById('asset-label').innerHTML = `<span>${getAssetIcon(ativoAtual)}</span> ${ativoAtual}`;
            document.getElementById('confianca-valor').innerText = conf + '%';
            document.getElementById('tf-valor').innerText = tfAtual;

            if(direcao === 'COMPRA') {
                txt.className = "signal-text orbitron font-black neon-buy";
                sc.className = "fas fa-chevron-up text-4xl text-green-500 animate-bounce";
                sb.className = "fas fa-chevron-up text-4xl text-green-500 opacity-10";
            } else {
                txt.className = "signal-text orbitron font-black neon-sell";
                sc.className = "fas fa-chevron-down text-4xl text-red-500 opacity-10";
                sb.className = "fas fa-chevron-down text-4xl text-red-500 animate-bounce";
            }
        }
    </script>
</body>
</html>
